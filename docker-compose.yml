services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: ${API_PORT:-4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://192.168.1.4:5173}
      DATABASE_URL: file:/app/data/trips.db
      ENABLE_REDIS_CACHE: ${ENABLE_REDIS_CACHE:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NOMINATIM_BASE_URL: ${NOMINATIM_BASE_URL:-https://nominatim.openstreetmap.org}
      NOMINATIM_USER_AGENT: "${NOMINATIM_USER_AGENT:-TripIntelligence/1.0 (contact: you@example.com)}"
      OSRM_BASE_URL: ${OSRM_BASE_URL:-https://router.project-osrm.org}
      OPEN_TRIP_MAP_API_KEY: ${OPEN_TRIP_MAP_API_KEY:-}
      OPEN_TRIP_MAP_BASE_URL: ${OPEN_TRIP_MAP_BASE_URL:-https://api.opentripmap.com/0.1/en/places}
      OVERPASS_BASE_URL: ${OVERPASS_BASE_URL:-https://overpass-api.de/api/interpreter}
      OPEN_METEO_BASE_URL: ${OPEN_METEO_BASE_URL:-https://api.open-meteo.com/v1}
      OPEN_CHARGE_MAP_BASE_URL: ${OPEN_CHARGE_MAP_BASE_URL:-https://api.openchargemap.io/v3}
      OPEN_CHARGE_MAP_API_KEY: ${OPEN_CHARGE_MAP_API_KEY:-}
      ENABLE_OPEN_TRIP_MAP: ${ENABLE_OPEN_TRIP_MAP:-false}
      ENABLE_OPEN_CHARGE_MAP: ${ENABLE_OPEN_CHARGE_MAP:-true}
      ENABLE_CONSTRUCTION_PROVIDER: ${ENABLE_CONSTRUCTION_PROVIDER:-false}
      DEFAULT_MAX_DETOUR_KM: ${DEFAULT_MAX_DETOUR_KM:-15}
      DEFAULT_STOPS_PER_CATEGORY: ${DEFAULT_STOPS_PER_CATEGORY:-8}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-900}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    volumes:
      - sqlite_data:/app/data
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://192.168.1.4:4000/api}
    environment:
      WEB_PORT: ${WEB_PORT:-5173}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    ports:
      - "6379:6379"

  osrm:
    image: osrm/osrm-backend:latest
    profiles: ["osrm"]
    command: ["osrm-routed", "--algorithm", "mld", "/data/region.osrm"]
    volumes:
      - ./infra/osrm:/data
    ports:
      - "5000:5000"

volumes:
  sqlite_data:
