services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      API_PORT: ${API_PORT:-4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DATABASE_URL: file:/app/data/trips.db
      ENABLE_REDIS_CACHE: ${ENABLE_REDIS_CACHE:-false}
      REDIS_URL: redis://redis:6379
    volumes:
      - sqlite_data:/app/data
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      WEB_PORT: ${WEB_PORT:-5173}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000/api}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    ports:
      - "6379:6379"

  osrm:
    image: osrm/osrm-backend:latest
    profiles: ["osrm"]
    command: ["osrm-routed", "--algorithm", "mld", "/data/region.osrm"]
    volumes:
      - ./infra/osrm:/data
    ports:
      - "5000:5000"

volumes:
  sqlite_data: